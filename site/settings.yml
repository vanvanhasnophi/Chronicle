# ============================================================
# Chronicle Lite — 站点配置文件
# 扁平 key: value 格式，直接编辑即可
# 未列出的字段由 convert 自动填入标准默认值
# ============================================================

# 站点名称（显示在浏览器标题栏和页面头部）
title: Chronicle Lite

# 站点描述（显示在主页卡片副标题）
description: ""

# 站点 URL（你的域名，用于 SEO / RSS / 站点地图）
url: https://example.com

# 站点默认语言（follow / en / zh-CN）
language: follow

# 前台默认主题（light / dark / follow）
theme: follow

# 主题色（十六进制颜色值）
accent: "#2ea35f"

# 字体（sans / serif）
font: sans

# ── 主页布局 ────────────────────────────────────

# 首页模式（split / cards / cover）
homepage: split

# 单列模式（强制主页单列，无视宽度和二列内容）
singleColumnHomepage: false

# 卡片显隐（控制主页右侧栏哪些卡片显示）
cardVisibility:
  author: true      # 作者卡片
  taxonomy: true    # 快速导航卡片（标签云+归档）
  activity: true    # 动态卡片

# ── 性能 ────────────────────────────────────────

# 性能模式（auto=自动检测 / full=全效果 / reduced=流畅模式）
defaultPerformanceMode: auto

# ── 功能开关 ────────────────────────────────────

# RSS 订阅
rss: true

# 站点地图
sitemap: false

# 友链页面
friendsPage: true

# 合集页面
collectionPage: true

# 关于页面
aboutPage: true

# 搜索建议
searchSuggestions: false

# 相关文章推荐
relatedPosts: false

# 流量统计 (Google Analytics)
traffic: true


# Google Analytics 4 测量 ID（留空则不注入 GA）
gaMeasurementId: ""

# ICP备案号（留空则不显示）
icpNumber: ""
