# Chronicle CI/CD — Type check + Electron release
#
# - PR / push main: type check only (full users run install.sh to build)
# - Tag v*: type check → build Electron (linux/mac/win) → GitHub Release

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ── Type Check ─────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Type check
        run: |
          cd packages/manager && npx vue-tsc --noEmit
          cd ../gen    && npx tsc --noEmit
          cd ../shared && npx tsc --noEmit

  # ── Electron Desktop (tag push only) ───────────────────
  build-electron:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }

      - name: Install dependencies
        run: npm ci

      - name: Install Electron + builder
        run: cd packages/manager && npm install electron electron-builder --save-dev --save-exact

      - name: Fix public symlinks (broken in CI — replace with empty dirs)
        run: node -e "['upload','branding','manager-background'].forEach(d=>{try{require('fs').rmSync('packages/manager/public/server/data/'+d,{recursive:true,force:true})}catch{};require('fs').mkdirSync('packages/manager/public/server/data/'+d,{recursive:true})})"

      - name: Build Vite + Electron
        env:
          ELECTRON: 'true'
        run: cd packages/manager && npx vite build && npx electron-builder --${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'mac' || 'win' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-electron-${{ matrix.os }}
          path: packages/manager/release/*

  # ── GitHub Release (tag push only) ─────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-electron
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: chronicle-electron-ubuntu-latest }
      - uses: actions/download-artifact@v4
        with: { name: chronicle-electron-macos-latest }
      - uses: actions/download-artifact@v4
        with: { name: chronicle-electron-windows-latest }

      - name: Rename artifacts
        run: |
          mv *.AppImage "Chronicle-Manager-${{ github.ref_name }}-linux.AppImage" 2>/dev/null || true
          mv *.dmg  "Chronicle-Manager-${{ github.ref_name }}-mac.dmg" 2>/dev/null || true
          mv *.exe  "Chronicle-Manager-${{ github.ref_name }}-win.exe" 2>/dev/null || true
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Chronicle-Manager-*.AppImage
            Chronicle-Manager-*.dmg
            Chronicle-Manager-*.exe
          body: |
            ## Chronicle Manager ${{ github.ref_name }}

            桌面客户端（Electron）。下载对应平台的安装包即可使用，无需安装 Node.js 或任何依赖。

            | 文件 | 平台 |
            |---|---|
            | `.AppImage` | Linux |
            | `.dmg` | macOS |
            | `.exe` | Windows |

            > VPS 部署请使用 `install.sh`：`git clone` → `bash install.sh install`

          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
