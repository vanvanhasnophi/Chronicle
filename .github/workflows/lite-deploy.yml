# Chronicle Lite — Build & Deploy to GitHub Pages
#
# Lite users fork the `lite` branch. This workflow runs in their fork
# on every push. It converts site/ → data/, builds the Astro SSG site,
# and deploys to GitHub Pages.
#
# User setup (one-time):
#   1. Fork the lite branch
#   2. Settings → Pages → Source: GitHub Actions
#   3. Edit site/settings.yml, site/posts/*.md
#   4. Push → auto-deploy

name: Deploy Lite to Pages

on:
  push:
    branches: [lite, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm ci

      - name: Build static site (site/ → data/ → dist/)
        run: |
          node packages/gen/bin/cli.mjs build --site \
            -d data \
            -c packages/template-astro \
            -t dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
